services:
  users_test_db:
    image: postgres:15
    env_file:
      - user-service/.env.test
    ports:
      - "5433:5432"
    tmpfs: # auto clean
      - /var/lib/postgresql/data
    restart: always
    command: postgres -c max_prepared_transactions=1000
  
  books_test_db:
    image: postgres:15
    env_file:
      - book-service/.env.test
    ports:
      - "5436:5432"
    tmpfs: # auto clean
      - /var/lib/postgresql/data
    restart: always
    command: postgres -c max_prepared_transactions=1000

  users_test:
    build: 
      dockerfile: user-service/Dockerfile
      context: .
    env_file:
      user-service/.env.test
    depends_on:
      - users_test_db
    working_dir: /app/user-service
    volumes:
      - ./common:/app/common
      - ./user-service:/app/user-service
    command: >
      sh -c "
        ../wait-for-db.sh &&
        alembic upgrade head &&
        poetry run pytest -v
      "

  books_test:
    build: 
      dockerfile: book-service/Dockerfile
      context: .
    env_file:
      book-service/.env.test
    depends_on:
      - books_test_db
    working_dir: /app/book-service
    volumes:
      - ./common:/app/common
      - ./book-service:/app/book-service
    command: >
      sh -c "
        ../wait-for-db.sh &&
        alembic upgrade head &&
        poetry run pytest -v
      "

  coordinator_test:
    build: 
      dockerfile: coordinator/Dockerfile
      context: .
    env_file:
      coordinator/.env.test
    working_dir: /app/coordinator
    volumes:
      - ./common:/app/common
      - ./coordinator:/app/coordinator
    command: >
      sh -c "
        poetry run pytest -v
      "
